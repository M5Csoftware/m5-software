name: Bump Version & Release

on:
  push:
    branches:
      - main
    paths-ignore:
      - "version.json"
      - "src-tauri/Cargo.lock"

jobs:
  bump-and-release:
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
      # ── 1. Checkout ───────────────────────────────────────────────────
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1
          token: ${{ secrets.GITHUB_TOKEN }}

      # ── 2. Bump version numbers ───────────────────────────────────────
      - name: Read current version
        id: read
        shell: bash
        run: |
          CURRENT=$(jq -r '.version' version.json)
          echo "current=$CURRENT" >> $GITHUB_OUTPUT
          echo "Current: $CURRENT"

      - name: Bump patch version
        id: bump
        shell: bash
        run: |
          CURRENT="${{ steps.read.outputs.current }}"
          IFS='.' read -r MAJOR MINOR PATCH <<< "$CURRENT"
          NEW_PATCH=$((PATCH + 1))
          NEW_VERSION="$MAJOR.$MINOR.$NEW_PATCH"
          echo "new_version=$NEW_VERSION" >> $GITHUB_OUTPUT
          echo "Bumped: $CURRENT → $NEW_VERSION"

      - name: Get commit message
        id: msg
        shell: bash
        run: |
          MSG=$(git log -1 --pretty=%s)
          ESCAPED=$(echo "$MSG" | sed 's/"/\\"/g')
          echo "notes=$ESCAPED" >> $GITHUB_OUTPUT

      - name: Update Cargo.toml and tauri.conf.json versions
        shell: bash
        run: |
          NEW_VERSION="${{ steps.bump.outputs.new_version }}"

          # Cargo.toml — only first occurrence (package version, not deps)
          sed -i "0,/^version = \".*\"/{s/^version = \".*\"/version = \"$NEW_VERSION\"/}" src-tauri/Cargo.toml
          echo "Cargo version:"; grep '^version' src-tauri/Cargo.toml | head -1

          # tauri.conf.json
          jq --arg v "$NEW_VERSION" '.package.version = $v' src-tauri/tauri.conf.json > tmp.json
          mv tmp.json src-tauri/tauri.conf.json
          echo "tauri.conf version:"; jq '.package.version' src-tauri/tauri.conf.json

      # ── 3. Setup build environment ────────────────────────────────────
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install Node dependencies
        env:
          NEXT_PUBLIC_SERVER: ${{ secrets.NEXT_PUBLIC_SERVER }}
        run: npm install

      # ── 4. Build signed Tauri app ─────────────────────────────────────
      - name: Build Tauri app
        env:
          TAURI_PRIVATE_KEY: ${{ secrets.TAURI_PRIVATE_KEY }}
          TAURI_KEY_PASSWORD: ${{ secrets.TAURI_KEY_PASSWORD }}
          NEXT_PUBLIC_SERVER: ${{ secrets.NEXT_PUBLIC_SERVER }}
        run: npm run tauri build

      # ── 5. Find built files ───────────────────────────────────────────
      - name: Find installer files
        id: files
        shell: bash
        run: |
          MSI=$(find src-tauri/target/release/bundle/msi -name "*.msi" | head -1)
          SIG=$(find src-tauri/target/release/bundle/msi -name "*.msi.zip.sig" | head -1)
          ZIP=$(find src-tauri/target/release/bundle/msi -name "*.msi.zip" | head -1)
          echo "msi=$MSI" >> $GITHUB_OUTPUT
          echo "sig=$SIG" >> $GITHUB_OUTPUT
          echo "zip=$ZIP" >> $GITHUB_OUTPUT
          echo "MSI: $MSI"
          echo "SIG: $SIG"
          echo "ZIP: $ZIP"
          if [ -z "$MSI" ]; then echo "ERROR: MSI not found!"; exit 1; fi
          if [ -z "$SIG" ]; then echo "ERROR: SIG not found! Check TAURI_PRIVATE_KEY secret"; exit 1; fi
          if [ -z "$ZIP" ]; then echo "ERROR: ZIP not found!"; exit 1; fi

      # ── 6. Write version.json with signature for silent updater ───────
      - name: Write version.json
        shell: bash
        run: |
          NEW_VERSION="${{ steps.bump.outputs.new_version }}"
          NOTES="${{ steps.msg.outputs.notes }}"
          PUB_DATE=$(date -u +"%Y-%m-%dT%H:%M:%SZ")
          SIGNATURE=$(cat "${{ steps.files.outputs.sig }}")

          # GitHub replaces spaces with dots in release asset names
          ZIP_NAME=$(basename "${{ steps.files.outputs.zip }}" | sed 's/ /./g')

          cat > version.json << JSONEOF
          {
            "version": "$NEW_VERSION",
            "notes": "$NOTES",
            "pub_date": "$PUB_DATE",
            "platforms": {
              "windows-x86_64": {
                "signature": "$SIGNATURE",
                "url": "https://github.com/M5Csoftware/m5-software/releases/download/v$NEW_VERSION/$ZIP_NAME"
              }
            }
          }
          JSONEOF

          echo "version.json:"; cat version.json

      # ── 7. Commit all version files back to main ──────────────────────
      - name: Commit and push
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add version.json src-tauri/Cargo.toml src-tauri/tauri.conf.json
          git diff --staged --quiet && echo "Nothing to commit" && exit 0
          git commit -m "chore: bump version to ${{ steps.bump.outputs.new_version }} [skip ci]"
          git push

      # ── 8. Create GitHub Release ──────────────────────────────────────
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.bump.outputs.new_version }}
          name: v${{ steps.bump.outputs.new_version }}
          body: ${{ steps.msg.outputs.notes }}
          files: |
            ${{ steps.files.outputs.msi }}
            ${{ steps.files.outputs.zip }}
            ${{ steps.files.outputs.sig }}
          make_latest: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

name: Bump Version & Release

on:
  push:
    branches:
      - main
    paths-ignore:
      - "version.json"
      - "src-tauri/Cargo.lock"

jobs:
  bump-and-release:
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1
          token: ${{ secrets.GITHUB_TOKEN }}

      # ── Bump version numbers ──────────────────────────────────────────
      - name: Read current version
        id: read
        shell: bash
        run: |
          CURRENT=$(jq -r '.version' version.json)
          echo "current=$CURRENT" >> $GITHUB_OUTPUT
          echo "Current: $CURRENT"

      - name: Bump patch version
        id: bump
        shell: bash
        run: |
          CURRENT="${{ steps.read.outputs.current }}"
          IFS='.' read -r MAJOR MINOR PATCH <<< "$CURRENT"
          NEW_PATCH=$((PATCH + 1))
          NEW_VERSION="$MAJOR.$MINOR.$NEW_PATCH"
          echo "new_version=$NEW_VERSION" >> $GITHUB_OUTPUT
          echo "Bumped: $CURRENT → $NEW_VERSION"

      - name: Get commit message
        id: msg
        shell: bash
        run: |
          MSG=$(git log -1 --pretty=%s)
          ESCAPED=$(echo "$MSG" | sed 's/"/\\"/g')
          echo "notes=$ESCAPED" >> $GITHUB_OUTPUT

      - name: Update version.json
        shell: bash
        run: |
          NEW_VERSION="${{ steps.bump.outputs.new_version }}"
          NOTES="${{ steps.msg.outputs.notes }}"
          PUB_DATE=$(date -u +"%Y-%m-%dT%H:%M:%SZ")
          printf '{\n  "version": "%s",\n  "notes": "%s",\n  "pub_date": "%s"\n}\n' \
            "$NEW_VERSION" "$NOTES" "$PUB_DATE" > version.json
          cat version.json

      - name: Update Cargo.toml version
        shell: bash
        run: |
          NEW_VERSION="${{ steps.bump.outputs.new_version }}"
          sed -i "0,/^version = \".*\"/{s/^version = \".*\"/version = \"$NEW_VERSION\"/}" src-tauri/Cargo.toml
          grep '^version' src-tauri/Cargo.toml | head -1

      - name: Update tauri.conf.json version
        shell: bash
        run: |
          NEW_VERSION="${{ steps.bump.outputs.new_version }}"
          jq --arg v "$NEW_VERSION" '.package.version = $v' src-tauri/tauri.conf.json > tmp.json
          mv tmp.json src-tauri/tauri.conf.json
          jq '.package.version' src-tauri/tauri.conf.json

      # ── Setup build environment ───────────────────────────────────────
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install Node dependencies
        run: npm install

      # ── Build signed Tauri app ────────────────────────────────────────
      - name: Build Tauri app
        env:
          TAURI_PRIVATE_KEY: ${{ secrets.TAURI_PRIVATE_KEY }}
          TAURI_KEY_PASSWORD: ${{ secrets.TAURI_KEY_PASSWORD }}
        run: npm run tauri build

      # ── Find built files ──────────────────────────────────────────────
      - name: Find installer files
        id: files
        shell: bash
        run: |
          NEW_VERSION="${{ steps.bump.outputs.new_version }}"
          MSI=$(find src-tauri/target/release/bundle/msi -name "*.msi" | head -1)
          SIG=$(find src-tauri/target/release/bundle/msi -name "*.msi.zip.sig" | head -1)
          ZIP=$(find src-tauri/target/release/bundle/msi -name "*.msi.zip" | head -1)
          echo "msi=$MSI" >> $GITHUB_OUTPUT
          echo "sig=$SIG" >> $GITHUB_OUTPUT
          echo "zip=$ZIP" >> $GITHUB_OUTPUT
          echo "Found MSI: $MSI"
          echo "Found SIG: $SIG"
          echo "Found ZIP: $ZIP"

      # ── Create update.json for Tauri silent updater ───────────────────
      - name: Create update.json
        shell: bash
        run: |
          NEW_VERSION="${{ steps.bump.outputs.new_version }}"
          NOTES="${{ steps.msg.outputs.notes }}"
          PUB_DATE=$(date -u +"%Y-%m-%dT%H:%M:%SZ")
          SIG_FILE="${{ steps.files.outputs.sig }}"
          SIGNATURE=$(cat "$SIG_FILE")
          ZIP_NAME=$(basename "${{ steps.files.outputs.zip }}")

          cat > update.json << EOF
          {
            "version": "$NEW_VERSION",
            "notes": "$NOTES",
            "pub_date": "$PUB_DATE",
            "platforms": {
              "windows-x86_64": {
                "signature": "$SIGNATURE",
                "url": "https://github.com/M5Csoftware/m5-software/releases/download/v$NEW_VERSION/$ZIP_NAME"
              }
            }
          }
          EOF
          echo "update.json:"
          cat update.json

      # ── Commit version bumps back to main ─────────────────────────────
      - name: Commit version bump
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add version.json update.json src-tauri/Cargo.toml src-tauri/tauri.conf.json
          git diff --staged --quiet && echo "Nothing to commit" && exit 0
          git commit -m "chore: bump version to ${{ steps.bump.outputs.new_version }} [skip ci]"
          git push

      # ── Create GitHub Release with installer attached ─────────────────
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.bump.outputs.new_version }}
          name: v${{ steps.bump.outputs.new_version }}
          body: ${{ steps.msg.outputs.notes }}
          files: |
            ${{ steps.files.outputs.msi }}
            ${{ steps.files.outputs.zip }}
            ${{ steps.files.outputs.sig }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}